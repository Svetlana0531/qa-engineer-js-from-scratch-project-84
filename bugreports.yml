---
- summary: |
        После успешного оформления заказа по кнопке "Checkout" корзина не очищается, товары остаются внутри
  environment: |
    Google Chrome	146.0.7680.177 (официальная сборка) (64 бит)
    Ubuntu 22.04.5 LTS
  steps-to-reproduce: |
    1. Перейти на главную страницу https://products-store.hexlet.app/
    2. Нажать кнопку "В корзину" (Add to cart) у любого доступного товара.
    3. Кликнуть по иконке корзины в шапке сайта для перехода на страницу /cart.
    4. Нажать на кнопку "Checkout" для завершения оформления заказа.
    5. Ошибка происходит на этом шаге: появляется уведомление об успешном заказе, но список товаров под ним не исчезает.
  expected-result: |
        После клика на "Checkout" заказ уходит в обработку. Корзина пользователя полностью очищается (массив товаров обнуляется). Интерфейс показывает пустую корзину или перенаправляет на страницу успешной покупки.
  actual-result: |
       Появляется сообщение об оформлении заказа, но все добавленные товары по-прежнему отображаются в списке корзины. Итоговая сумма (Total) и счетчик товаров в шапке сайта не сбрасываются до нуля.
