---
- summary: |
    Поиск товара по точному названию через поисковую строку
  requirement: |
    При вводе существующего названия товара система должна отображать его в результатах поиска
  prerequisites: |
    Открыта главная страница интернет-магазина. В базе данных существует товар «Chanel Coco Noir Eau De».
  test-data: |
    Поисковый запрос = Chanel Coco Noir Eau De
  steps:
    - Вводим поисковый запрос в строку поиска 
  expected-result: |
    Скрывается полный список товаров. На первой позиции отображается карточка товара «Chanel Coco Noir Eau De».

- summary: |
    Добавление доступного товара в корзину из карточки товара
  requirement: |
    При нажатии на кнопку добавления товар должен появляться в корзине пользователя с корректными данными
  prerequisites:
    Открыта карточка товара, который есть в наличии на складе. Корзина пользователя пуста.
  test-data: |
    Товар = Chanel Coco Noir Eau De
  steps:
    - Нажимаем кнопку «Добавить в корзину»
    - Переходим на страницу корзины через иконку в шапке сайта
  expected-result: |
    На странице корзины отображается добавленный товар с верным названием, ценой и количеством.
